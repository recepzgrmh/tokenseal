name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write # for npm provenance, if/when publishing is enabled

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG pkg=$PKG"
          test "$TAG" = "$PKG" || { echo "Tag $TAG != package.json $PKG"; exit 1; }

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run eval
      - run: npm run build
      - run: npm pack --dry-run

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      # Publishing is intentionally NOT enabled by default. To publish, add an
      # NPM_TOKEN secret and uncomment. Provenance is on for supply-chain trust.
      # - run: npm publish --provenance --access public
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
